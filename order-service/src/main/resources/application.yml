spring:
  application:
    name: order-service

server:
  port: 8082
  ssl:
    enabled: ${feature.security-https-enabled:false}
    client-auth: need
    key-store: classpath:certificates/keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: wiremock-demo
    trust-store: classpath:certificates/truststore.p12
    trust-store-password: changeit
    trust-store-type: PKCS12

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  opentelemetry:
    resource-attributes:
      service.name: order-service
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} spanId=%X{spanId} - %msg%n"

services:
  inventory:
    base-url: http://localhost:8081
  wiremock:
    base-url: http://localhost:8092

feature:
  wiremock-via-interceptor: false
  wiremock-as-proxy: false
  wiremock-use-forward-proxy: false
  security-https-enabled: false

